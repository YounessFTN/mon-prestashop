services:
  prestashop:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_SERVER: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWD: ${DB_PASSWORD}
      PS_INSTALL_AUTO: 0
      PS_DOMAIN: ${PS_DOMAIN}
      PS_LANGUAGE: fr
      PS_COUNTRY: FR
      PS_ENABLE_SSL: 1
    volumes:
      - prestashop_data:/var/www/html
    networks:
      - prestashop_net

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - prestashop_net

volumes:
  prestashop_data:
  db_data:

networks:
  prestashop_net:
    driver: bridge
